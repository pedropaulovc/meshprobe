name: Auto-tag

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  tag:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_repository.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v8.3.2
        with:
          python-version: "3.12"

      - name: Check version tag
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(uv version --short)
          TAG="v${VERSION}"
          if gh api "repos/${{ github.repository }}/git/ref/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping"
            echo "exists=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          {
            echo "exists=false"
            echo "version=$VERSION"
            echo "tag=$TAG"
          } >> "$GITHUB_OUTPUT"

      - uses: actions/setup-go@v6
        if: steps.version.outputs.exists == 'false'
        with:
          go-version: "1.26"
          cache: false

      - name: Validate release workflows
        if: steps.version.outputs.exists == 'false'
        run: |
          go run github.com/rhysd/actionlint/cmd/actionlint@v1.7.12
          if ! awk '
            $0 == "on:" { in_on=1; next }
            in_on && /^[^ ]/ { exit !found }
            in_on && /^  workflow_dispatch:/ { found=1 }
            END { exit !found }
          ' .github/workflows/publish.yml; then
            echo "::error::publish.yml must define an on.workflow_dispatch trigger"
            exit 1
          fi

      - name: Verify changelog entry
        if: steps.version.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          CHANGELOG=$(awk -v heading="## [$VERSION]" '
            index($0, heading) == 1 { flag=1; next }
            /^## \[/ { flag=0 }
            flag
          ' CHANGELOG.md)
          if [ -z "$CHANGELOG" ]; then
            echo "::error::CHANGELOG.md does not contain an entry for version $VERSION"
            echo "Add a '## [$VERSION] - YYYY-MM-DD' section to CHANGELOG.md"
            exit 1
          fi

      - name: Build release distributions
        if: steps.version.outputs.exists == 'false'
        run: uv build

      - name: Create version tag
        id: tag
        if: steps.version.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          SHA="${{ github.event.workflow_run.head_sha }}"
          git fetch origin main
          MAIN_SHA=$(git rev-parse origin/main)
          if [ "$SHA" != "$MAIN_SHA" ]; then
            echo "Skipping stale commit $SHA; current main is $MAIN_SHA"
            echo "created=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Creating tag $TAG"
          gh api "repos/${{ github.repository }}/git/refs" \
            -f ref="refs/tags/$TAG" \
            -f sha="$SHA"
          echo "created=true" >> "$GITHUB_OUTPUT"

      - name: Trigger publish workflow
        if: steps.tag.outputs.created == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run publish.yml --ref "${{ steps.version.outputs.tag }}"

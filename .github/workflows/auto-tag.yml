name: Auto-tag

on:
  push:
    branches: [main]

jobs:
  tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v8.3.2
        with:
          python-version: "3.12"

      - name: Check version tag
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(uv version --short)
          TAG="v${VERSION}"
          if gh api "repos/${{ github.repository }}/git/refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping"
            echo "exists=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          {
            echo "exists=false"
            echo "version=$VERSION"
            echo "tag=$TAG"
          } >> "$GITHUB_OUTPUT"

      - name: Verify changelog entry
        if: steps.version.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          CHANGELOG=$(awk -v heading="## [$VERSION]" '
            index($0, heading) == 1 { flag=1; next }
            /^## \[/ { flag=0 }
            flag
          ' CHANGELOG.md)
          if [ -z "$CHANGELOG" ]; then
            echo "::error::CHANGELOG.md does not contain an entry for version $VERSION"
            echo "Add a '## [$VERSION] - YYYY-MM-DD' section to CHANGELOG.md"
            exit 1
          fi

      - name: Install release dependencies
        if: steps.version.outputs.exists == 'false'
        run: uv sync --locked --all-groups

      - name: Validate release
        if: steps.version.outputs.exists == 'false'
        run: |
          uv run ruff format --check .
          uv run ruff check .
          uv run mypy src
          uv build

      - name: Create version tag
        if: steps.version.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          echo "Creating tag $TAG"
          SHA=$(git rev-parse HEAD)
          gh api "repos/${{ github.repository }}/git/refs" \
            -f ref="refs/tags/$TAG" \
            -f sha="$SHA"

      - name: Trigger publish workflow
        if: steps.version.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run publish.yml --ref "${{ steps.version.outputs.tag }}"

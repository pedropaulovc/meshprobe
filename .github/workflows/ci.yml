name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
      - name: Install Bubblewrap sandbox
        run: |
          sudo apt-get update
          sudo apt-get install --yes apparmor-profiles bubblewrap
          sudo cp \
            /usr/share/apparmor/extra-profiles/bwrap-userns-restrict \
            /etc/apparmor.d/bwrap-userns-restrict
          sudo apparmor_parser -r /etc/apparmor.d/bwrap-userns-restrict
      - run: uv sync --locked --all-groups
      - run: uv run pytest

  linux:
    runs-on: ubuntu-latest
    env:
      GALLIUM_DRIVER: llvmpipe
      LIBGL_ALWAYS_SOFTWARE: "1"
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Install Bubblewrap sandbox
        run: |
          sudo apt-get update
          sudo apt-get install --yes apparmor-profiles bubblewrap
          sudo cp \
            /usr/share/apparmor/extra-profiles/bwrap-userns-restrict \
            /etc/apparmor.d/bwrap-userns-restrict
          sudo apparmor_parser -r /etc/apparmor.d/bwrap-userns-restrict
      - name: Install Blender 5.2 LTS from official release
        run: |
          archive="$RUNNER_TEMP/blender-5.2.0-linux-x64.tar.xz"
          checksums="$RUNNER_TEMP/blender-5.2.0.sha256"
          curl \
            --fail \
            --location \
            --retry 3 \
            --retry-all-errors \
            --retry-delay 10 \
            --output "$archive" \
            "https://download.blender.org/release/Blender5.2/blender-5.2.0-linux-x64.tar.xz"
          curl \
            --fail \
            --location \
            --retry 3 \
            --retry-all-errors \
            --retry-delay 10 \
            --output "$checksums" \
            "https://download.blender.org/release/Blender5.2/blender-5.2.0.sha256"
          expected=$(awk '$2 == "blender-5.2.0-linux-x64.tar.xz" {print $1}' "$checksums")
          if [ -z "$expected" ]; then
            echo "Official checksum file has no Linux x64 entry" >&2
            exit 1
          fi
          actual=$(sha256sum "$archive" | awk '{print $1}')
          if [ "$actual" != "$expected" ]; then
            echo "Blender archive checksum mismatch: expected $expected, got $actual" >&2
            exit 1
          fi
          tar --extract --file "$archive" --directory "$RUNNER_TEMP"
          echo "$RUNNER_TEMP/blender-5.2.0-linux-x64" >> "$GITHUB_PATH"
          "$RUNNER_TEMP/blender-5.2.0-linux-x64/blender" --version
      - run: uv sync --locked --all-groups
      - run: uv run pytest --cov --cov-report=term-missing

  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          python-version: "3.12"
          enable-cache: true
      - run: uv sync --locked --all-groups
      - run: uv run ruff format --check .
      - run: uv run ruff check .
      - run: uv run mypy src

  windows:
    runs-on: windows-latest
    env:
      GALLIUM_DRIVER: llvmpipe
      LIBGL_ALWAYS_SOFTWARE: "1"
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Install Mesa software OpenGL
        uses: ssciwr/setup-mesa-dist-win@2dfeaebfa514f74c2b8cd8d27108c31486d33e72
        with:
          version: "26.1.3"
          build-type: release-msvc
          deployment-choice: "1"
      - name: Install Blender 5.2 LTS from official release
        run: |
          $installer = Join-Path $env:RUNNER_TEMP "blender-5.2.0-windows-x64.msi"
          curl.exe `
            --fail `
            --location `
            --retry 3 `
            --retry-all-errors `
            --retry-delay 10 `
            --output $installer `
            "https://download.blender.org/release/Blender5.2/blender-5.2.0-windows-x64.msi"
          if ($LASTEXITCODE -ne 0) {
            throw "Official Blender download failed with curl exit code $LASTEXITCODE"
          }
          $expected = "8ba59aed79dfc35d65c5e9e0ccc828d618796499483ccdeee0b534a915140606"
          $actual = (Get-FileHash $installer -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($actual -ne $expected) {
            throw "Blender installer checksum mismatch: expected $expected, got $actual"
          }
          $installation = Start-Process `
            msiexec.exe `
            -ArgumentList @("/i", $installer, "/quiet", "/norestart") `
            -Wait `
            -PassThru
          if ($installation.ExitCode -notin @(0, 1641, 3010)) {
            throw "Blender installer exited with code $($installation.ExitCode)"
          }
          $blender = Get-ChildItem `
            "$env:ProgramFiles\Blender Foundation" `
            -Filter blender.exe -Recurse `
            | Select-Object -First 1
          if ($null -eq $blender) {
            throw "Chocolatey installed Blender without a discoverable blender.exe"
          }
          $blender.DirectoryName | Out-File $env:GITHUB_PATH -Encoding utf8 -Append
          & $blender.FullName --version
      - run: uv sync --locked --all-groups
      - run: uv run pytest
